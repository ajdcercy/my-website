<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Welcome to Gâlanthír</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:wght@400;500&display=swap');

  html,body{
    margin:0;
    padding:0;
    width:100%;
    overflow-x:hidden;
    background:#1c2e2e;
    font-family:'Cormorant Garamond', serif;
  }

  .stage{
    position:relative;
    width:100%;
    min-height:100vh;
    min-height:100dvh;
  }

  .map-bg{
    position:absolute;
    inset:0;
    background-image:url('map_bg.webp');
    background-size:cover;
    background-position:center;
  }

  .darken{
    position:absolute;
    inset:0;
    background:rgba(10,20,20,0.55);
  }

  .title-wrap{
    position:relative;
    z-index:5;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    padding:8vh 6vw 10vh;
  }

  .intro-text{
    max-width:680px;
    margin:24px auto 0;
    font-size:18px;
    line-height:1.75;
    color:#e8c987;
    text-shadow:0 2px 10px rgba(0,0,0,0.6);
  }

  .welcome{
    font-size:clamp(22px, 3vw, 32px);
    color:#e8c987;
    text-shadow:0 2px 10px rgba(0,0,0,0.6);
  }

  .welcome .title{
    font-family:'Cinzel', serif;
    font-weight:700;
    font-size:clamp(40px, 7vw, 84px);
    display:block;
    color:#e8c987;
    letter-spacing:0.05em;
    margin-top:10px;
    text-shadow:0 3px 18px rgba(0,0,0,0.6);
  }

  .icon-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    z-index:50;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:60px;
    padding:18px 4vw calc(18px + env(safe-area-inset-bottom));
    background:linear-gradient(to top, rgba(8,14,14,0.85), rgba(8,14,14,0));
  }

  .icon-nav a{
    display:block;
    width:84px;
    height:84px;
    border-radius:50%;
    clip-path:circle(50%);
  }

  .icon-nav img{
    width:84px;
    height:84px;
    object-fit:contain;
    cursor:pointer;
    transition:transform 0.3s ease;
  }

  .icon-nav img:hover{
    transform:translateY(-6px);
  }

  /* --- Scrollable content below the hero --- */
  .articles{
    position:relative;
    background:#15211f;
    color:#e9dcc3;
    padding:80px 8vw calc(140px + env(safe-area-inset-bottom));
  }

  .articles .article{
    max-width:700px;
    margin:0 auto 70px;
  }

  .articles h2{
    font-family:'Cinzel', serif;
    color:#e8c987;
    font-size:clamp(26px, 3vw, 36px);
    margin-bottom:16px;
  }

  .articles .meta{
    font-size:14px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:#cdbf9e;
    margin-bottom:18px;
  }

  .articles p{
    font-size:18px;
    line-height:1.75;
    margin-bottom:18px;
  }
  @media (max-width:640px){
    .title-wrap{
      padding:6vh 6vw 4vh;
    }

    .welcome{
      font-size:16px;
    }

    .welcome .title{
      font-size:clamp(32px, 12vw, 52px);
      margin-top:6px;
    }

    .icon-nav{
      flex-wrap:wrap;
    }

    .icon-nav{
      gap:14px;
      padding:10px 4vw calc(12px + env(safe-area-inset-bottom));
    }

    .icon-nav a{
      width:52px;
      height:52px;
    }

    .icon-nav img{
      width:52px;
      height:52px;
    }
  }

  /* --- Very short screens (landscape phones) --- */
  @media (max-height:480px){
    .title-wrap{
      padding:4vh 6vw 2vh;
    }
    .welcome{ font-size:13px; }
    .welcome .title{ font-size:clamp(26px, 8vw, 40px); margin-top:4px; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="map-bg"></div>
  <div class="darken"></div>

  <div class="title-wrap">
    <p class="welcome">Welcome to <span class="title">Gâlanthír</span></p>
    <p class="intro-text">Hello. My name is A. J. d'Cercy, and this is my website, all about my world, Gâlanthír, and the books set in it. You can use the icons below to explore the people, the gods, the magic, and the world I've been building for more than twelve years.</p>
  </div>

  <nav class="icon-nav">
    <a href="world.html"><img src="world_icon.webp" alt="World"></a>
    <a href="people.html"><img src="people_icon.webp" alt="People"></a>
    <a href="gods.html"><img src="gods_icon.webp" alt="Gods"></a>
    <a href="magic.html"><img src="magic_icon.webp" alt="Magic"></a>
    <a href="books.html"><img src="book_icon.webp" alt="Books"></a>
    <a href="about.html"><img src="quill_icon.webp" alt="About Me"></a>
  </nav>
</div>

</body>
</html>
