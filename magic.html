<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Magic of Gâlanthír</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:wght@400;500&display=swap');

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    height:100%;
    width:100%;
    overflow:hidden;
    font-family:'Cormorant Garamond', serif;
    background:#070b16;
  }

  .stage{
    position:relative;
    width:100%;
    height:100vh;
    height:100dvh;
    overflow:hidden;
  }

  /* --- Starfield (pure CSS) --- */
  .starfield{
    position:absolute;
    inset:0;
    background:radial-gradient(ellipse at 50% 30%, #1a2547 0%, #0c1124 55%, #060912 100%);
    overflow:hidden;
  }

  .stars, .stars2, .stars3{
    position:absolute;
    inset:0;
    background-repeat:repeat;
  }

  .stars{
    background-image:
      radial-gradient(1px 1px at 20px 30px, #ffffff, transparent),
      radial-gradient(1px 1px at 90px 80px, #cfe0ff, transparent),
      radial-gradient(1px 1px at 160px 120px, #ffffff, transparent),
      radial-gradient(1px 1px at 230px 50px, #e8eeff, transparent),
      radial-gradient(1px 1px at 300px 160px, #ffffff, transparent);
    background-size:320px 200px;
    animation:drift 140s linear infinite;
    opacity:0.9;
  }

  .stars2{
    background-image:
      radial-gradient(1.5px 1.5px at 50px 60px, #ffffff, transparent),
      radial-gradient(1.5px 1.5px at 140px 150px, #bcd2ff, transparent),
      radial-gradient(1.5px 1.5px at 220px 20px, #ffffff, transparent),
      radial-gradient(1.5px 1.5px at 290px 110px, #dce6ff, transparent);
    background-size:360px 240px;
    animation:drift 90s linear infinite;
    opacity:0.7;
  }

  .stars3{
    background-image:
      radial-gradient(2px 2px at 80px 90px, #ffffff, transparent),
      radial-gradient(2px 2px at 200px 180px, #aec4ff, transparent),
      radial-gradient(2px 2px at 320px 60px, #ffffff, transparent);
    background-size:420px 300px;
    animation:twinkle 6s ease-in-out infinite alternate, drift 60s linear infinite;
    opacity:0.85;
  }

  @keyframes drift{
    from{ transform:translateY(0); }
    to{ transform:translateY(-200px); }
  }

  @keyframes twinkle{
    from{ opacity:0.4; }
    to{ opacity:1; }
  }

  /* --- Back link --- */
  .back-home{
    position:absolute;
    top:24px;
    left:24px;
    z-index:30;
    color:#cdbf9e;
    text-decoration:none;
    font-size:15px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    text-shadow:0 2px 8px rgba(0,0,0,0.6);
    transition:color 0.2s ease;
  }
  .back-home:hover{ color:#e8c987; }

  /* --- Content --- */
  .content{
    position:relative;
    z-index:10;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:#f4ead2;
    padding:5vh 4vw;
  }

  h1{
    font-family:'Cinzel', serif;
    font-size:clamp(28px, 5vw, 48px);
    color:#e8c987;
    margin-bottom:6px;
    text-shadow:0 0 24px rgba(232,201,135,0.35);
  }

  .intro-text{
    max-width:560px;
    margin:0 auto 28px;
    font-size:16px;
    line-height:1.55;
    color:#cfd8ef;
  }

  /* --- Carousel --- */
  .carousel{
    position:relative;
    width:100%;
    max-width:760px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;
  }

  .arrow{
    flex-shrink:0;
    width:54px;
    height:54px;
    border-radius:50%;
    border:1px solid #6f7bb0;
    background:rgba(20,28,56,0.6);
    color:#e8eeff;
    font-size:24px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    z-index:5;
  }
  .arrow:hover{
    background:rgba(60,75,140,0.7);
    border-color:#e8c987;
    transform:scale(1.08);
  }

  /* The window clips the sliding strip */
  .slide-window{
    position:relative;
    width:300px;
    height:auto;
    flex-shrink:0;
    overflow:hidden;
  }

  /* The slide that's currently shown */
  .slide{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .slide img.card{
    width:260px;
    max-width:70vw;
    height:auto;
    display:block;
    border-radius:10px;
    filter:drop-shadow(0 12px 30px rgba(0,0,0,0.6));
  }

  .slide .blurb{
    margin-top:18px;
    max-width:300px;
    font-size:16px;
    line-height:1.55;
    color:#dbe3f7;
    min-height:90px;
  }

  /* Slide-out / slide-in animation states */
  .slide.out-left{  animation:slideOutLeft 0.35s ease forwards; }
  .slide.out-right{ animation:slideOutRight 0.35s ease forwards; }
  .slide.in-left{   animation:slideInLeft 0.35s ease forwards; }
  .slide.in-right{  animation:slideInRight 0.35s ease forwards; }

  @keyframes slideOutLeft{
    to{ transform:translateX(-120%); opacity:0; }
  }
  @keyframes slideOutRight{
    to{ transform:translateX(120%); opacity:0; }
  }
  @keyframes slideInLeft{
    from{ transform:translateX(120%); opacity:0; }
    to{ transform:translateX(0); opacity:1; }
  }
  @keyframes slideInRight{
    from{ transform:translateX(-120%); opacity:0; }
    to{ transform:translateX(0); opacity:1; }
  }

  .dots{
    margin-top:22px;
    display:flex;
    gap:10px;
    justify-content:center;
  }
  .dot{
    width:9px;
    height:9px;
    border-radius:50%;
    background:rgba(180,195,255,0.3);
    cursor:pointer;
    transition:background 0.2s ease, transform 0.2s ease;
  }
  .dot.is-active{
    background:#e8c987;
    transform:scale(1.2);
  }
</style>
</head>
<body>

<div class="stage">

  <div class="starfield">
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>
  </div>

  <a class="back-home" href="index.html">&larr; Back to Home</a>

  <div class="content">
    <h1>The Magic of Gâlanthír</h1>
    <p class="intro-text">Five schools shape the flow of power across the world. Use the arrows to turn through them.</p>

    <div class="carousel">
      <button class="arrow" id="prev" aria-label="Previous">&#8249;</button>

      <div class="slide-window" id="slideWindow">
        <div class="slide" id="slide">
          <img class="card" id="cardImg" src="Arcane.webp" alt="">
          <p class="blurb" id="cardBlurb"></p>
        </div>
      </div>

      <button class="arrow" id="next" aria-label="Next">&#8250;</button>
    </div>

    <div class="dots" id="dots"></div>
  </div>

</div>

<script>
  // Edit the blurb text for each school here.
  const schools = [
    { img:'Arcane.webp',  alt:'Arcane sigil',  blurb:'Describe the Arcane school here — the magic of study, structure, and learned formulae.' },
    { img:'Bardic.webp',  alt:'Bardic sigil',  blurb:'Describe the Bardic school here — magic woven through music, voice, and story.' },
    { img:'Divine.webp',  alt:'Divine sigil',  blurb:'Describe the Divine school here — power granted through faith and the gods.' },
    { img:'Pact.webp',    alt:'Pact sigil',    blurb:'Describe the Pact school here — power bargained for from other beings or forces.' },
    { img:'Wild.webp',    alt:'Natural sigil', blurb:'Describe the Natural school here — raw, instinctive magic drawn from nature.' }
  ];

  const slide    = document.getElementById('slide');
  const cardImg  = document.getElementById('cardImg');
  const cardBlurb= document.getElementById('cardBlurb');
  const dotsWrap = document.getElementById('dots');
  let current = 0;
  let animating = false;

  // Build dots
  schools.forEach((s, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.addEventListener('click', () => { if(i !== current) goTo(i, i > current ? 1 : -1); });
    dotsWrap.appendChild(dot);
  });
  const dots = Array.from(dotsWrap.children);

  function paint(i){
    cardImg.src = schools[i].img;
    cardImg.alt = schools[i].alt;
    cardBlurb.textContent = schools[i].blurb;
    dots.forEach((d, di) => d.classList.toggle('is-active', di === i));
  }

  function goTo(index, dir){
    if (animating) return;
    animating = true;

    const next = (index + schools.length) % schools.length;

    // dir = 1 means moving forward (current slides out left, new comes in from right)
    // dir = -1 means moving backward (current slides out right, new comes in from left)
    slide.classList.remove('in-left','in-right','out-left','out-right');
    slide.classList.add(dir === 1 ? 'out-left' : 'out-right');

    slide.addEventListener('animationend', function handler(){
      slide.removeEventListener('animationend', handler);
      current = next;
      paint(current);
      slide.classList.remove('out-left','out-right');
      slide.classList.add(dir === 1 ? 'in-right' : 'in-left');

      slide.addEventListener('animationend', function done(){
        slide.removeEventListener('animationend', done);
        slide.classList.remove('in-left','in-right');
        animating = false;
      });
    });
  }

  document.getElementById('next').addEventListener('click', () => goTo(current + 1, 1));
  document.getElementById('prev').addEventListener('click', () => goTo(current - 1, -1));

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft')  goTo(current - 1, -1);
    if (e.key === 'ArrowRight') goTo(current + 1, 1);
  });

  paint(current);
</script>

</body>
</html>
